id: design_direction
title: 디자인 방향 수립
description: 레퍼런스 수집, 디자인 방향성 정의, 디자인 브리프를 작성한다.
version: 1
input_fields:
  - project
  - goals
required_fields:
  - project
  - goals

steps:
  - id: reference_plan
    agent: planner
    tier: nano
    output_key: ref_plan
    tools: []
    prompt: |
      당신은 UX 디자이너입니다.
      아래 프로젝트의 디자인 레퍼런스 수집 계획을 수립하세요.

      [프로젝트]
      {project}

      [디자인 목표]
      {goals}

      [추가 요청]
      {notes}

      다음을 JSON으로만 출력하세요 (설명 없이):
      {
        "keywords": ["검색어1", "검색어2", "검색어3"],
        "style_direction": "목표 스타일 1문장",
        "reference_categories": ["카테고리1", "카테고리2"]
      }

  - id: reference_gather
    agent: designer
    tier: research
    output_key: references
    tools:
      - web_search
    prompt: |
      당신은 UX 디자이너입니다.
      아래 계획에 따라 디자인 레퍼런스를 수집하세요.

      [수집 계획]
      {ref_plan}

      [지침]
      - 실제 서비스 UI/UX 레퍼런스를 수집하세요
      - 각 레퍼런스는 URL, 특징, 벤치마킹 포인트를 포함하세요
      - 색상, 타이포그래피, 레이아웃 관점에서 분석하세요
      - 최소 5개 이상 수집하세요

      ## 레퍼런스 수집 결과

      | 서비스 | URL | 특징 | 벤치마킹 포인트 |
      |--------|-----|------|----------------|
      ...

      ## 공통 디자인 패턴
      ...

  - id: direction_define
    agent: designer
    tier: standard
    output_key: direction
    system: |
      당신은 10년 경력의 시니어 UX 디자이너입니다.
      레퍼런스 분석을 통해 실현 가능하고 차별화된 디자인 방향을 도출합니다.
    tools: []
    prompt: |
      수집된 레퍼런스를 바탕으로 디자인 방향성을 정의하세요.

      [프로젝트]
      {project}

      [디자인 목표]
      {goals}

      [레퍼런스]
      {references}

      [수정 요청]
      {direction_feedback}

      <format>
      ## 디자인 컨셉
      (핵심 키워드 3개 + 1문장 컨셉 설명)

      ## 비주얼 방향
      ### 색상
      - Primary: (색상 + 의도)
      - Secondary: (색상 + 의도)
      - 배경/텍스트: (색상 + 의도)

      ### 타이포그래피
      - 폰트 추천: (이유 포함)
      - 위계 구조: (H1/H2/Body 크기 가이드)

      ### 레이아웃
      - 그리드 시스템
      - 여백 원칙
      - 컴포넌트 스타일 키워드

      ## 피해야 할 방향
      (안티 패턴 2-3개)
      </format>

    revision_prompt: |
      아래 디자인 방향성을 검토자 피드백에 따라 수정하세요.

      [기존 디자인 방향]
      {direction}

      [수정 요청]
      {revision_request}

      지침:
      - 수정 요청에서 지적한 부분만 수정하고 나머지는 원문 그대로 유지하세요
      - 변경된 항목 앞에 (수정됨) 표시를 붙이세요
      수정된 전체 디자인 방향을 완성된 형태로 출력하세요.

  - id: direction_review
    agent: reviewer
    tier: deep
    output_key: direction_critique
    tools: []
    prompt: |
      아래 디자인 방향성을 검토하고 개선점을 제시하세요.

      [프로젝트]
      {project}

      [디자인 목표]
      {goals}

      [디자인 방향]
      {direction}

      다음 관점에서 검토하세요:
      1. 목표와 방향성의 일치도
      2. 실현 가능성 (기술적 구현 난이도)
      3. 사용자 접근성 (색상 대비, 가독성)
      4. 일관성 (색상/타이포/레이아웃 간 조화)
      5. 차별성 (레퍼런스와 충분히 차별화되는가)

      ## 검토 결과
      ### 잘된 점
      ### 개선 필요 사항 (우선순위 상위 3개만)
      ### 권장 수정안 (항목별 구체적 변경 지시)

      [출력 제약]
      - 500단어 이내
      - 개선 필요 사항은 우선순위 상위 3개에 집중
      - 각 항목: 문제 1문장 + 근거 1문장 + 수정안 1문장

    revision_prompt: |
      아래 디자인 방향 검토 결과를 추가 피드백에 따라 보완하세요.

      [기존 검토 결과]
      {direction_critique}

      [추가 수정 요청]
      {revision_request}

      지침:
      - 추가 요청 사항만 반영해 검토 결과를 보완하세요
      - 변경된 항목 앞에 (수정됨) 표시를 붙이세요
      보완된 전체 검토 결과를 출력하세요.

  - id: brief
    agent: designer
    tier: standard
    output_key: brief
    system: |
      당신은 10년 경력의 시니어 UX 디자이너입니다.
      검토 의견을 완전히 반영한 실행 가능한 디자인 브리프를 작성합니다.
    tools: []
    prompt: |
      디자인 방향성과 검토 의견을 반영해 최종 디자인 브리프를 작성하세요.

      [프로젝트]
      {project}

      [디자인 방향]
      {direction}

      [검토 의견]
      {direction_critique}

      [레퍼런스]
      {references}

      # {project} 디자인 브리프

      ## 1. 프로젝트 개요
      ## 2. 디자인 목표
      ## 3. 타깃 사용자
      ## 4. 디자인 컨셉 & 방향
      ## 5. 비주얼 가이드라인
        - 색상 팔레트
        - 타이포그래피
        - 레이아웃 원칙
      ## 6. 레퍼런스
      ## 7. 다음 단계 (디자인 작업 항목)

      전문적이고 실행 가능하게 작성하세요.

    revision_prompt: |
      아래 디자인 브리프를 검토자 피드백에 따라 수정하세요.

      [기존 디자인 브리프]
      {brief}

      [수정 요청]
      {revision_request}

      지침:
      - 수정 요청에서 지적한 부분만 수정하고 나머지는 원문 그대로 유지하세요
      - 변경된 섹션 앞에 (수정됨) 표시를 붙이세요
      수정된 전체 디자인 브리프를 완성된 형태로 출력하세요.

gates:
  - id: direction_check
    after_step: direction_review
    prompt: "검토 의견을 확인하세요. [승인] 하면 검토 의견이 다음 단계(브리프)에 자동 반영됩니다. 방향 자체를 바꾸고 싶을 때만 피드백을 입력하고 [수정 후 재검토]를 선택하세요."
    auto_advance_after: null

  - id: brief_review
    after_step: brief
    prompt: "디자인 브리프를 확인하세요. 이상 없으면 승인, 추가 수정이 필요하면 피드백을 입력하고 수정 후 재검토를 선택하세요."
    auto_advance_after: null
