id: research
title: 리서치
description: 경쟁사 분석·UX 트렌드·사용성 리서치를 수행하고 리포트를 생성한다.
version: 1
input_fields:
  - topic
  - scope
  - depth
required_fields:
  - topic

steps:
  - id: plan
    agent: planner
    tier: nano
    output_key: plan
    tools: []
    prompt: |
      당신은 UX 리서치 전문가입니다.
      사용자의 리서치 요청을 분석해 구체적인 조사 계획을 수립하세요.

      [요청]
      주제: {topic}
      범위: {scope}
      깊이: {depth}
      추가 메모: {notes}

      다음을 JSON으로만 출력하세요 (설명 없이):
      {
        "summary": "리서치 목적 1문장",
        "queries": ["검색어1", "검색어2", "검색어3"],
        "focus_points": ["핵심 관찰 포인트1", "핵심 관찰 포인트2"],
        "output_sections": ["섹션1", "섹션2"]
      }

  - id: gather
    agent: researcher
    tier: research
    output_key: findings
    tools:
      - web_search
      - url_fetch
    prompt: |
      당신은 UX 리서치 전문가입니다.
      아래 리서치 계획에 따라 정보를 수집하고 핵심 내용을 정리하세요.

      [리서치 계획]
      {plan}

      [지침]
      - 제공된 검색어로 최신 정보를 수집하세요
      - 각 발견 사항은 출처(URL)와 함께 기록하세요
      - 중복 내용은 통합하세요
      - 한국어로 작성하세요

      수집된 내용을 마크다운으로 정리해 출력하세요.

  - id: synthesize
    agent: planner
    tier: standard
    output_key: insights
    tools: []
    prompt: |
      당신은 UX 리서치 전문가입니다.
      수집된 데이터를 분석해 핵심 인사이트를 도출하세요.

      [리서치 계획]
      {plan}

      [수집된 데이터]
      {findings}

      다음 형식으로 인사이트를 작성하세요:
      ## 핵심 발견
      (3-5개 핵심 발견, 각각 구체적 근거 포함)

      ## 패턴 및 트렌드
      (공통적으로 나타나는 패턴)

      ## 시사점
      (우리 서비스/업무에 적용 가능한 시사점)

  - id: report
    agent: planner
    tier: standard
    output_key: report
    tools: []
    prompt: |
      당신은 UX 리서치 전문가입니다.
      분석 결과를 전달력 있는 리포트로 작성하세요.

      [주제]
      {topic}

      [인사이트]
      {insights}

      [수집된 데이터]
      {findings}

      다음 구조로 완성된 리포트를 작성하세요:
      # {topic} 리서치 리포트

      ## 개요
      ## 주요 발견
      ## 상세 분석
      ## 권장사항
      ## 참고 자료

      전문적이고 읽기 쉽게, 한국어로 작성하세요.

    revision_prompt: |
      당신은 UX 리서치 전문가입니다.
      아래 리포트를 검토자 피드백에 따라 부분 수정하세요.

      [기존 리포트]
      {report}

      [검토자 수정 요청]
      {revision_request}

      [참고 데이터 — 필요 시 활용]
      {findings}

      수정 지침:
      - 검토자가 지적한 부분만 수정하고 나머지는 원문 그대로 유지하세요
      - 변경된 섹션 앞에 '(수정됨)' 표시를 붙이세요
      - 전체 리포트를 완성된 형태로 출력하세요

      수정된 전체 리포트를 출력하세요.

gates:
  - id: scope_review
    after_step: plan
    prompt: "리서치 계획을 확인하세요. [승인] 하면 정보 수집을 시작합니다. 검색 범위나 방향을 바꾸고 싶으면 피드백을 입력하고 [수정 후 재검토]를 선택하세요."
    auto_advance_after: null

  - id: final_review
    after_step: report
    prompt: "리서치 리포트를 확인하세요. 이상 없으면 승인, 추가 분석이 필요하면 피드백을 입력하고 수정 후 재검토를 선택하세요."
    auto_advance_after: 86400
