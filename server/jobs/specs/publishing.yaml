id: publishing
title: 퍼블리싱
description: 디자인 브리프·화면 명세를 기반으로 HTML/CSS 마크업 산출물을 생성하고 품질을 검증한다.
version: 1
input_fields:
  - screen
  - spec
required_fields:
  - screen
  - spec

steps:
  - id: spec_analysis
    agent: planner
    tier: nano
    output_key: analysis
    tools: []
    prompt: |
      당신은 웹 퍼블리셔입니다.
      아래 화면 명세를 분석해 구현 계획을 수립하세요.

      [화면]
      {screen}

      [명세]
      {spec}

      [추가 요청]
      {notes}

      다음을 JSON으로만 출력하세요 (설명 없이):
      {
        "components": ["컴포넌트1", "컴포넌트2"],
        "layout_type": "레이아웃 유형 (flex/grid/etc)",
        "responsive_breakpoints": ["모바일", "태블릿", "데스크톱"],
        "interactions": ["인터랙션1", "인터랙션2"],
        "tech_stack": "HTML/CSS/Tailwind 또는 기타"
      }

  - id: markup_draft
    agent: developer
    tier: standard
    output_key: markup
    tools: []
    prompt: |
      당신은 시니어 웹 퍼블리셔입니다.
      아래 명세를 바탕으로 시맨틱하고 접근성을 갖춘 마크업을 작성하세요.

      [화면]
      {screen}

      [명세]
      {spec}

      [구현 분석]
      {analysis}

      [수정 요청]
      {markup_feedback}

      요구사항:
      - 시맨틱 HTML5 태그 사용 (section, article, nav, header, main, footer 등)
      - Tailwind CSS 유틸리티 클래스 사용
      - 모바일 퍼스트 반응형 구현 (sm:/md:/lg: prefix)
      - ARIA 속성으로 접근성 확보
      - BEM 또는 명확한 클래스 네이밍

      완성된 HTML 코드를 ```html 코드블록으로 출력하세요.
      필요시 추가 CSS를 ```css 블록으로, JS를 ```js 블록으로 분리하세요.

  - id: markup_review
    agent: reviewer
    tier: deep
    output_key: markup_critique
    tools: []
    prompt: |
      당신은 시니어 프론트엔드 개발자입니다.
      아래 마크업을 엄격하게 검토하세요.

      [화면 명세]
      {spec}

      [마크업]
      {markup}

      다음 관점에서 검토하세요:
      1. 시맨틱 구조 (HTML5 태그 적절성)
      2. 접근성 (ARIA, 대체텍스트, 키보드 탐색)
      3. 반응형 완성도 (모바일/태블릿/데스크톱)
      4. 성능 (불필요한 중첩, 중복 스타일)
      5. 코드 가독성 및 유지보수성
      6. 크로스브라우저 호환성 이슈

      ## 검토 결과
      ### 합격 항목
      ### 수정 필요 항목 (심각도: Critical/Major/Minor)
      ### 수정된 코드 스니펫 (Critical/Major 항목)

  - id: markup_final
    agent: developer
    tier: standard
    output_key: final_markup
    tools: []
    prompt: |
      당신은 시니어 웹 퍼블리셔입니다.
      검토 의견을 반영해 최종 마크업을 완성하세요.

      [원본 마크업]
      {markup}

      [검토 의견]
      {markup_critique}

      모든 Critical/Major 이슈를 수정한 최종 마크업을 출력하세요.
      변경 사항은 주석으로 표시하세요: <!-- [수정] 이유 -->

      최종 HTML을 ```html 코드블록으로 출력하세요.

  - id: qa_checklist
    agent: reviewer
    tier: fast
    output_key: qa_result
    tools: []
    prompt: |
      당신은 QA 엔지니어입니다.
      아래 최종 마크업을 QA 체크리스트로 검증하세요.

      [화면 명세]
      {spec}

      [최종 마크업]
      {final_markup}

      ## QA 체크리스트

      ### 구조
      - [ ] DOCTYPE 선언
      - [ ] lang 속성 설정
      - [ ] 필수 meta 태그 (viewport, charset)
      - [ ] 제목 계층 구조 (h1→h2→h3 순서)

      ### 접근성
      - [ ] 이미지 alt 속성
      - [ ] 폼 레이블 연결
      - [ ] 버튼/링크 명확한 텍스트
      - [ ] 포커스 스타일 존재

      ### 반응형
      - [ ] 모바일 (320px~) 레이아웃 정상
      - [ ] 태블릿 (768px~) 레이아웃 정상
      - [ ] 데스크톱 (1280px~) 레이아웃 정상
      - [ ] overflow 없음

      ### 코드 품질
      - [ ] 인라인 스타일 없음 (또는 최소화)
      - [ ] 사용하지 않는 클래스 없음
      - [ ] 들여쓰기 일관성

      ## QA 결과
      합격: X / 전체: Y
      최종 판정: [PASS / FAIL]
      (FAIL이면 미합격 항목과 수정 지시)

  - id: report
    agent: developer
    tier: fast
    output_key: report
    tools: []
    prompt: |
      당신은 웹 퍼블리셔입니다.
      작업 내용을 정리한 퍼블리싱 완료 보고서를 작성하세요.

      [화면]
      {screen}

      [최종 마크업]
      {final_markup}

      [QA 결과]
      {qa_result}

      # {screen} 퍼블리싱 완료 보고서

      ## 1. 작업 개요
      ## 2. 구현 내용
        - 사용 기술
        - 컴포넌트 목록
        - 반응형 브레이크포인트
      ## 3. 최종 마크업
      ## 4. QA 결과 요약
      ## 5. 알려진 제한사항 / 후속 작업

gates:
  - id: markup_check
    after_step: markup_review
    prompt: "검토 의견을 확인하세요. [승인] 하면 검토 의견이 다음 단계(최종 마크업)에 자동 반영됩니다. 추가로 바꾸고 싶은 부분이 있을 때만 피드백을 입력하고 [수정 후 재검토]를 선택하세요."
    auto_advance_after: 3600

  - id: qa_check
    after_step: qa_checklist
    prompt: "QA 결과를 확인하세요. PASS면 승인, FAIL이면 미합격 항목을 피드백으로 입력하고 [수정 후 재검토]를 선택하세요."
    auto_advance_after: null

  - id: final_approval
    after_step: report
    prompt: "완료 보고서를 확인하세요. 이상 없으면 승인, 추가 수정이 필요하면 피드백을 입력하고 수정 후 재검토를 선택하세요."
    auto_advance_after: null
