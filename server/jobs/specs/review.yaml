id: review
title: 디자인·기획 리뷰
description: 산출물(디자인/기획서/코드)을 검토하고 접근성 감사 및 개선 보고서를 생성한다.
version: 1
input_fields:
  - artifact
  - review_type
  - output_format
required_fields:
  - artifact
field_questions:
  review_type: "어떤 관점으로 리뷰할까요? (UX 휴리스틱 / 접근성 / 코드품질 / 전체)"
  output_format: "리포트 형식은요? (마크다운 / HTML)"

steps:
  - id: intake
    agent: planner
    persona: senior_ux_researcher
    skills: [structured_writing]
    tier: nano
    output_key: intake
    tools: []
    prompt: |
      당신은 UX 리뷰 전문가입니다.
      아래 리뷰 요청을 분석해 검토 계획을 수립하세요.

      [리뷰 대상]
      {artifact}

      [리뷰 유형]
      {review_type}

      [추가 요청]
      {notes}

      다음을 JSON으로만 출력하세요 (설명 없이):
      {
        "review_focus": ["검토 포인트1", "검토 포인트2", "검토 포인트3"],
        "checklist_categories": ["카테고리1", "카테고리2"],
        "severity_criteria": "심각도 판단 기준 1문장"
      }

    revision_prompt: |
      아래 검토 계획을 추가 요청에 따라 조정하세요.

      [기존 검토 계획]
      {intake}

      [수정 요청]
      {revision_request}

      수정된 JSON을 출력하세요.

  - id: heuristic_scan
    agent: reviewer
    persona: senior_ux_researcher
    skills: [critique, structured_writing, ux_heuristics]
    tier: standard
    output_key: heuristic
    system: |
      당신은 닐슨 노먼 그룹 수준의 UX 리뷰 전문가입니다.
      사용성 원칙에 따라 객관적으로 산출물을 평가합니다.
    tools: []
    prompt: |
      닐슨 노먼의 10가지 사용성 휴리스틱을 기반으로 아래 산출물을 검토하세요.

      [리뷰 대상]
      {artifact}

      [검토 계획]
      {intake}

      각 항목별로 Pass/Fail/N/A 판정과 간략한 근거를 작성하세요:

      ## 휴리스틱 검토

      | # | 원칙 | 판정 | 근거 |
      |---|------|------|------|
      | 1 | 시스템 상태 가시성 | | |
      | 2 | 실제 환경과의 일치 | | |
      | 3 | 사용자 통제 및 자유 | | |
      | 4 | 일관성 및 표준 | | |
      | 5 | 오류 방지 | | |
      | 6 | 인식보다 회상 최소화 | | |
      | 7 | 유연성 및 효율성 | | |
      | 8 | 미학적이고 미니멀한 디자인 | | |
      | 9 | 오류 인식·진단·복구 지원 | | |
      | 10 | 도움말 및 문서 | | |

      ## Fail 항목 목록
      (Fail 판정을 받은 항목만 간략히 나열)

  - id: critical_triage
    agent: reviewer
    persona: senior_ux_researcher
    skills: [critique]
    tier: deep
    optional: true
    output_key: heuristic_critical
    tools: []
    prompt: |
      아래 휴리스틱 스캔의 Fail 항목만 재검증하세요.
      정말 Critical한 것 상위 3개만 심층 분석합니다.

      [리뷰 대상]
      {artifact}

      [휴리스틱 스캔 결과]
      {heuristic}

      ## Critical 이슈 심층 분석 (최대 3개)

      각 이슈에 대해:
      1. **이슈**: 1문장 요약
      2. **영향**: 사용자에게 미치는 실제 영향
      3. **근거**: 해당 휴리스틱 원칙과의 구체적 충돌 지점
      4. **수정안**: 구체적이고 실행 가능한 해결책

      [출력 제약]
      - 500단어 이내
      - Critical 이슈 최대 3개에만 집중
      - 각 이슈: 이슈·영향·근거·수정안 4줄 구조 준수

  - id: accessibility_audit
    agent: reviewer
    persona: senior_ux_researcher
    skills: [critique]
    tier: standard
    optional: true
    output_key: a11y
    system: |
      당신은 WCAG 전문 접근성 감사관입니다.
      WCAG 2.1 AA 기준을 철저히 적용해 감사합니다.
    tools: []
    prompt: |
      WCAG 2.1 AA 기준으로 아래 산출물을 감사하세요.

      [리뷰 대상]
      {artifact}

      다음 항목을 검토하세요:

      ## 접근성 감사 (WCAG 2.1 AA)

      ### 인식 가능성 (Perceivable)
      - [ ] 색상 대비 4.5:1 이상 (일반 텍스트)
      - [ ] 색상 대비 3:1 이상 (큰 텍스트/UI 요소)
      - [ ] 이미지에 대체 텍스트 존재
      - [ ] 색상만으로 정보 전달하지 않음

      ### 조작 가능성 (Operable)
      - [ ] 키보드 탐색 가능
      - [ ] 포커스 표시 명확
      - [ ] 충분한 클릭 영역 (44x44px 이상)
      - [ ] 동작/애니메이션 제어 가능

      ### 이해 가능성 (Understandable)
      - [ ] 오류 메시지 명확
      - [ ] 레이블/힌트 텍스트 적절
      - [ ] 일관된 인터랙션 패턴

      ### 견고성 (Robust)
      - [ ] 시맨틱 마크업 구조 적절
      - [ ] ARIA 속성 사용 여부

      ## 접근성 이슈 목록
      | 이슈 | 심각도 | WCAG 항목 | 권장 수정 |
      |------|--------|-----------|---------|
      ...

      ## 접근성 점수
      합격 항목: X / 전체: Y

  - id: improvement_plan
    agent: reviewer
    persona: product_manager
    skills: [structured_writing, prioritization]
    tier: standard
    output_key: improvements
    tools: []
    prompt: |
      검토 결과를 바탕으로 우선순위별 개선 계획을 수립하세요.

      [휴리스틱 검토]
      {heuristic}

      [Critical 이슈]
      {heuristic_critical}

      [접근성 감사]
      {a11y}

      ## 개선 우선순위

      ### P0 — 즉시 수정 필요 (출시 블로커)
      (사용자에게 심각한 영향을 미치는 이슈)

      ### P1 — 다음 스프린트 내 수정
      (사용성에 영향은 있지만 출시는 가능한 이슈)

      ### P2 — 장기 개선 과제
      (경험 향상을 위한 개선 사항)

      ## 빠른 개선안 (Quick Wins)
      (1-2시간 내 해결 가능한 개선 3-5개)

      ## 개선 효과 예상
      (개선 시 기대 효과)

    revision_prompt: |
      아래 개선 계획을 검토자 피드백에 따라 수정하세요.

      [기존 개선 계획]
      {improvements}

      [수정 요청]
      {revision_request}

      지침:
      - 수정 요청에서 지적한 부분만 수정하고 나머지는 원문 그대로 유지하세요
      - 변경된 항목 앞에 (수정됨) 표시를 붙이세요
      수정된 전체 개선 계획을 완성된 형태로 출력하세요.

  - id: score_chart
    agent: reviewer
    persona: senior_ux_researcher
    skills: [structured_writing]
    tier: nano
    optional: true
    output_key: score_chart
    tools: []
    prompt: |
      아래 휴리스틱 검토 결과를 Mermaid 차트로 시각화하세요.

      [휴리스틱 검토]
      {heuristic}

      [접근성 감사]
      {a11y}

      Pass/Fail 판정을 집계해 다음 형식으로 출력하세요 (```mermaid 코드블록만):
      ```mermaid
      pie title UX 품질 스코어
        "Pass" : 7
        "Fail" : 2
        "N/A" : 1
      ```

      실제 개수를 집계해 숫자를 채우세요.

  - id: report
    agent: reviewer
    persona: senior_ux_researcher
    skills: [structured_writing, source_citation]
    tier: standard
    output_key: report
    system: |
      당신은 닐슨 노먼 그룹 수준의 UX 리뷰 전문가입니다.
      전문적이고 실행 가능한 리뷰 리포트를 작성합니다.
    tools: []
    prompt: |
      검토 결과를 완성된 리뷰 리포트로 작성하세요.

      [리뷰 대상]
      {artifact}

      [휴리스틱 검토]
      {heuristic}

      [Critical 이슈]
      {heuristic_critical}

      [접근성 감사]
      {a11y}

      [개선 계획]
      {improvements}

      # 리뷰 리포트

      ## 1. 개요 및 평가 요약
      ## 2. 휴리스틱 검토 결과
      ## 3. Critical 이슈 심층 분석
      ## 4. 접근성 감사 결과
      ## 5. 우선순위별 개선 사항
      ## 6. 빠른 개선안 (Quick Wins)
      ## 7. 결론 및 다음 단계

      전문적이고 실행 가능하게 작성하세요.

    revision_prompt: |
      아래 리뷰 리포트를 검토자 피드백에 따라 수정하세요.

      [기존 리뷰 리포트]
      {report}

      [수정 요청]
      {revision_request}

      지침:
      - 수정 요청에서 지적한 부분만 수정하고 나머지는 원문 그대로 유지하세요
      - 변경된 섹션 앞에 (수정됨) 표시를 붙이세요
      수정된 전체 리포트를 완성된 형태로 출력하세요.

  - id: summary
    agent: reviewer
    persona: senior_ux_researcher
    skills: [structured_writing]
    tier: nano
    optional: true
    output_key: summary
    tools: []
    prompt: |
      아래 리뷰 리포트를 의사결정자가 빠르게 파악할 수 있도록 압축하세요.

      [리포트]
      {report}

      **형식 (반드시 준수):**
      ## 리뷰 요약
      (2-3문장 — 전반적 품질 수준 + 가장 심각한 문제)

      ## Critical 이슈
      - 이슈 1
      - 이슈 2 (있으면)

      ## 즉시 수정 권장
      (Quick Win 1-2개, 각 1줄)

gates:
  - id: scope_confirm
    after_step: intake
    prompt: "리뷰 범위를 확인하세요. [승인] 하면 본격 검토를 시작합니다. 범위나 관점을 바꾸고 싶으면 피드백을 입력하고 [수정 후 재검토]를 선택하세요."
    auto_advance_after: 1800

  - id: final_review
    after_step: summary
    prompt: "리뷰 리포트와 핵심 요약을 확인하세요. 이상 없으면 승인, 추가 분석이 필요하면 피드백을 입력하고 수정 후 재검토를 선택하세요."
    auto_advance_after: 86400
