description: 닐슨 10원칙 기반 사용성 체계적 검토
thinking_frame: |
  닐슨 10원칙 중 해당 화면에 적용 가능한 항목 선별:
  1) 시스템 상태 가시성 — 사용자가 현재 상태를 알 수 있는가
  2) 실제 세계와의 일치 — 사용자 언어, 친숙한 개념 사용
  3) 사용자 통제와 자유 — 실수 복구, 취소/되돌리기
  4) 일관성과 표준 — 플랫폼 관례 준수
  5) 오류 예방 — 실수 유발 설계 제거
  6) 인식 vs 기억 — 기억 부담 최소화
  7) 유연성과 효율 — 숙련자 단축 경로
  8) 미학과 최소 디자인 — 불필요한 정보 제거
  9) 오류 메시지 — 명확한 원인과 해결책
  10) 도움말과 문서 — 필요 시 쉽게 접근
  각 위반 항목: (원칙 번호 → 현상 → 개선안) 형식.
output_checklist:
  - 위반 심각도 0~4 등급 (Nielsen 척도)
  - 각 항목에 화면 위치 또는 컴포넌트명 명시
  - 개선안은 구체적 UI 변경으로 서술
  - 잘된 점은 포함하지 않음
