name: Accessibility — WCAG Contrast Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contrast:
    name: WCAG 2.1 AA 명도 대비 검사
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run contrast check
        working-directory: dashboard
        run: node scripts/check-contrast.mjs
