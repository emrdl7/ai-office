name: Dashboard — Vitest

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vitest:
    name: 대시보드 컴포넌트 테스트
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        working-directory: dashboard
        run: npm ci

      - name: Run vitest
        working-directory: dashboard
        run: npm test
